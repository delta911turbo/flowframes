name: Build and Package Flowframes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the package'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Flowframes often uses submodules for models/pkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x # Adjust this if the project uses 6.0 or 7.0

      - name: Build Solution
        run: |
          # We need to compile the binaries first so the package script finds them
          # This builds the solution and outputs to the path the .bat script expects
          dotnet publish Flowframes.sln -c Release -o CodeLegacy/bin/packed

      - name: Prepare Package with Batch Script
        shell: cmd
        working-directory: Build
        run: |
          :: Extract version from workflow input or use a default
          set APP_VER=${{ github.event.inputs.version || '1.0.0' }}
          
          :: Mocking the 'set /p' inputs for the .bat script
          :: Line 1: Version
          :: Line 2: Package Slim (Y)
          :: Line 3: Package Full (N)
          :: Line 4: Package Web Base (N)
          (
          echo %APP_VER%
          echo Y
          echo N
          echo N
          ) | call PackageBuild.bat
          
      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flowframes-Slim-Package
          # The script creates .7z files in the Build folder
          path: Build/*.7z
          retention-days: 5
