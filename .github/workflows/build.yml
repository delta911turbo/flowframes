name: Build and Package Flowframes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'

env:
  # Fixes the "Node.js 20 actions are deprecated" warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and Publish Solution
        # We target the 'Flowframes' directory where the project/solution files are.
        # We output directly to the path the .bat script expects: CodeLegacy/bin/packed
        run: |
          dotnet publish Flowframes -c Release -o CodeLegacy/bin/packed

      - name: Prepare Package with Batch Script
        shell: cmd
        working-directory: Build
        run: |
          set APP_VER=${{ github.event.inputs.version || '1.0.0' }}
          
          :: The batch script asks 4 questions: Version, Slim?, Full?, Web?
          :: We answer: [Version], Yes, No, No
          (
          echo %APP_VER%
          echo Y
          echo N
          echo N
          ) | call PackageBuild.bat
          
      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flowframes-Windows-x64
          path: Build/*.7z
          retention-days: 5
