name: Build and Package Flowframes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'

env:
  # Resolves the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Flowframes
        uses: actions/checkout@v4
        with:
          # We checkout into a folder named 'flowframes'
          path: flowframes
          submodules: recursive

      - name: Checkout NmkdUtils (Dependency)
        uses: actions/checkout@v4
        with:
          # This is the missing dependency required by the solution
          repository: n00mkrad/nmkd-utils
          path: nmkd-utils

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and Publish
        # We run this from the 'flowframes' directory
        # It now sees '../nmkd-utils' correctly
        working-directory: flowframes
        run: |
          dotnet publish Flowframes -c Release -o CodeLegacy/bin/packed

      - name: Prepare Package with Batch Script
        shell: cmd
        # The script is in flowframes/Build/
        working-directory: flowframes/Build
        run: |
          set APP_VER=${{ github.event.inputs.version || '1.0.0' }}
          
          :: Mocking inputs: Version, Slim (Y), Full (N), Web (N)
          (
          echo %APP_VER%
          echo Y
          echo N
          echo N
          ) | call PackageBuild.bat
          
      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flowframes-Windows-x64
          # Files are generated inside flowframes/Build/
          path: flowframes/Build/*.7z
          retention-days: 5
